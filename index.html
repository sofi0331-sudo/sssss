<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Достопримечательности России</title>

<style>
body {
    font-family: Arial;
    background: #f0f4f8;
    text-align: center;
}

.intro {
    background: white;
    margin: 20px auto;
    padding: 20px;
    width: 450px;
    border-radius: 15px;
}

.city {
    padding: 15px;
    margin: 15px auto;
    width: 300px;
    border-radius: 15px;
    cursor: pointer;
}

.moscow { border: 4px solid red; background: #ffe5e5; }
.spb { border: 4px solid blue; background: #e6f0ff; }
.gold { border: 4px solid gold; background: #fff9cc; }
</style>
</head>

<body>

<div class="intro">
    <h2>Достопримечательности России</h2>
    <p>Выбери город, чтобы узнать подробную информацию.</p>
</div>

<div class="city moscow" onclick="location.href='moscow.html'">
    <h3>Москва</h3>
</div>

<div class="city spb" onclick="location.href='spb.html'">
    <h3>Санкт-Петербург</h3>
</div>

<div class="city gold" onclick="location.href='gold.html'">
    <h3>Золотое кольцо</h3>
</div>

</body>
</html>
